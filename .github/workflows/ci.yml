name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check (web)
        working-directory: apps/web
        run: bunx tsc --noEmit

      - name: Type check (api)
        working-directory: apps/api
        run: bunx tsc --noEmit

      - name: Type check (types package)
        working-directory: packages/types
        run: bunx tsc --noEmit

      - name: Build web app
        working-directory: apps/web
        # Stub required env vars so Next.js/Clerk don't abort the build.
        # These are placeholder values only — never real keys.
        env:
          # Clerk validates key format at build time. These are structurally
          # valid dummy keys (correct prefix + base64 padding) — never real keys.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CI_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CI_CLERK_SECRET_KEY }}
          NEXT_PUBLIC_API_URL: https://example.com
          NEXT_PUBLIC_WS_URL: wss://example.com
        run: bunx next build
