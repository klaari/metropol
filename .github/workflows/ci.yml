name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check (types package)
        working-directory: packages/types
        run: bunx tsc --noEmit

      - name: Type check (api)
        working-directory: apps/api
        run: bunx tsc --noEmit

      - name: Type check (web)
        working-directory: apps/web
        run: bunx tsc --noEmit
