name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check (all packages)
        run: bunx turbo check-types

      - name: Build web app
        working-directory: apps/web
        # Stub required env vars so Next.js/Clerk don't abort the build.
        # These are placeholder values only — never real keys.
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_key_for_ci_build_only
          CLERK_SECRET_KEY: sk_test_placeholder_key_for_ci_build_only
          NEXT_PUBLIC_API_URL: https://example.com
          NEXT_PUBLIC_WS_URL: wss://example.com
        run: bunx next build

      - name: Build API (type check via tsc)
        working-directory: apps/api
        run: bunx tsc --noEmit
