name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (types package)
        working-directory: packages/types
        run: npx tsc --noEmit

      - name: Type check (api)
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Type check (web)
        working-directory: apps/web
        run: npx tsc --noEmit
