name: Mobile Design System

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "scripts/check-design-system.sh"
      - ".github/workflows/mobile-design-system.yml"
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "scripts/check-design-system.sh"
      - ".github/workflows/mobile-design-system.yml"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace @aani/mobile
